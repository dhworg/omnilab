# omnilab.yaml — generated by `omnilab new {name} --template ros-jazzy-gz-harmonic`.
# Pin `image` to a SHA256 digest before sharing this project (run
# `omnilab freeze` once that's implemented in Phase B.future).
name: {name}
host_min_version: 0.1.0
image: ghcr.io/dhworg/ros-jazzy-gz-harmonic:latest

ros:
  rmw: rmw_cyclonedds_cpp
  domain_id: 42

gazebo:
  default_world: turtlebot3_world.sdf
  defaults:
    shadows: false
    camera_fps: 15
    camera_resolution: [320, 240]

gpu: auto              # auto | igpu | nvidia

hardware:
  micro_ros: enabled
  boards: [arduino_uno, esp32, stm32_blue_pill, rp2040]

skills: []
