; PlatformIO config for {{project_name}} micro-ROS firmware on ESP32.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
  https://github.com/micro-ROS/micro_ros_arduino.git#jazzy
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DCONFIG_OMNILAB_PROJECT="{{project_name}}"
