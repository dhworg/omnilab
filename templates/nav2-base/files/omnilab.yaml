name: {{project_name}}
host_min_version: 0.1.0
image: ghcr.io/dhworg/ros-jazzy-gz-harmonic:latest

ros:
  rmw: rmw_cyclonedds_cpp
  domain_id: 42

gazebo:
  default_world: turtlebot3_world.sdf
  defaults:
    shadows: false
    camera_fps: 15
    camera_resolution: [320, 240]

gpu: auto

hardware:
  micro_ros: enabled
  boards: [arduino_uno, esp32, stm32_blue_pill, rp2040]

skills: []
